<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link 
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700" 
      rel="stylesheet"
    >
    <link 
      rel="stylesheet" 
      href="style.css" 
      media="screen"
    >
  </head>
  <body class="page-body">
    <div class="main-content">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower matrix">
      <a class="more-details" href="https://goal-life.com/page/method/matrix-eisenhower">
        Want more details?
      </a>
    </div>
    <div class="centered-main-page-element">
      <p id="top-section-for-adding-element-to-list">
        <label class="heading new-task-label" for="new-task">add item</label>
        <div class="task-row-wrapper">
          <input 
            id="new-task" 
            class="input-text task-input task" 
            type="text"
          >
          <button class="button">Add</button>
        </div>
      </p>
      <h3 class="heading">Todo</h3>
      <ul id="incomplete-tasks" class="list">
        <li class="list-item task-list-item">
          <input class="checkbox" type="checkbox">
          <label class="task task-label">Pay Bills</label>
          <input 
            type="text" 
            class="input-text task-input task"
          >
          <button class="button edit">Edit</button>
          <button class="button delete-button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>
        <li class="list-item edit-mode task-list-item">
          <input class="checkbox" type="checkbox">
          <label class="task task-label">Go Shopping</label>
          <input 
            type="text" 
            value="Go Shopping" 
            class="input-text task-input task"
          >
          <button class="button edit">Save</button>
          <button class="button delete-button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>
      </ul>
      <h3 class="heading">Completed</h3>
      <ul id="completed-tasks" class="list">
        <li class="list-item task-list-item">
          <input 
            class="checkbox"
            type="checkbox" 
            checked
          >
          <label class="task task-label">See the Doctor</label>
          <input 
            type="text" 
            class="input-text task-input task"
          >
          <button class="button edit">Edit</button>
          <button class="button delete-button">
            <img src="./remove.svg" alt="remove">
          </button>
        </li>
      </ul>
    </div>
    <script src="app.js"></script>
  </body>
</html>
