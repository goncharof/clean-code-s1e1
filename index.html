<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen">
</head>
<body class="page-body">
  <header class="header">
    <figure class="header__figure">
      <img class="header__img" src="./eisenhower-matrix.jpg" alt="eisenhower matrix">
      <figcaption>
        <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
        </a>
      </figcaption>
    </figure>
  </header>
  
  <main class="main">
    <section class="todo">
      <h2 class="todo__heading todo__heading_type_add-item">Add Item</h2>
      <div class="todo__input-wrapper">
        <input 
          id="new-task" 
          class="todo__input-text todo__input-text_type_task" 
          type="text"
          placeholder="Enter a new task"
        >
        <button class="todo__button todo__button_type_add" type="button">Add</button>
      </div>
    </section>
    
    <section class="todo">
      <h2 class="todo__heading">Todo</h2>
      <ul id="incomplete-tasks" class="todo__list">
        <li class="todo__list-item">
          <input class="todo__checkbox" type="checkbox">
          <label class="todo__task-label">Pay Bills</label>
          <input type="text" class="todo__input-text todo__input-text_type_task">
          <button class="todo__button todo__button_type_edit" type="button">Edit</button>
          <button class="todo__button todo__button_type_delete" type="button">
            <img class="todo__button-icon" src="./remove.svg" alt="Remove task">
          </button>
        </li>
        <li class="todo__list-item todo__list-item_state_edit-mode">
          <input class="todo__checkbox" type="checkbox">
          <label class="todo__task-label">Go Shopping</label>
          <input type="text" value="Go Shopping" class="todo__input-text todo__input-text_type_task">
          <button class="todo__button todo__button_type_edit" type="button">Save</button>
          <button class="todo__button todo__button_type_delete" type="button">
            <img class="todo__button-icon" src="./remove.svg" alt="Remove task">
          </button>
        </li>
      </ul>
    </section>
    
    <section class="todo">
      <h2 class="todo__heading">Completed</h2>
      <ul id="completed-tasks" class="todo__list">
        <li class="todo__list-item">
          <input class="todo__checkbox" type="checkbox" checked>
          <label class="todo__task-label">See the Doctor</label>
          <input type="text" class="todo__input-text todo__input-text_type_task">
          <button class="todo__button todo__button_type_edit" type="button">Edit</button>
          <button class="todo__button todo__button_type_delete" type="button">
            <img class="todo__button-icon" src="./remove.svg" alt="Remove task">
          </button>
        </li>
      </ul>
    </section>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
