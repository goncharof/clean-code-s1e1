<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css" media="screen">
</head>
<body class="page-body">
  <header class="header">
    <figure class="header__figure">
      <img class="header__img" src="./eisenhower-matrix.jpg" alt="eisenhower matrix">
      <figcaption>
        <a class="header__link" href="https://goal-life.com/page/method/matrix-eisenhower">
          Want more details?
        </a>
      </figcaption>
    </figure>
  </header>
  
  <main class="main">
    <section class="section section-add-item">
      <h2 class="section__heading section__heading_add-item" for="new-task">Add Item</h2>
      <div class="section-add-item__content">
        <input 
        id="new-task" 
        class="input-text task-input task" 
        type="text"
        placeholder="Enter a new task"
        >
        <button class="button" type="button">Add</button>
      </div>
    </section>
    
    <section class="section">
      <h2 class="section__heading">Todo</h2>
      <ul id="incomplete-tasks" class="list">
        <li class="list-item task-list-item">
          <input class="checkbox" type="checkbox" id="task1">
          <label for="task1" class="task task-label">Pay Bills</label>
          <input type="text" class="input-text task-input task">
          <button class="button edit" type="button">Edit</button>
          <button class="button delete-button" type="button">
            <img src="./remove.svg" alt="Remove task">
          </button>
        </li>
        <li class="list-item edit-mode task-list-item">
          <input class="checkbox" type="checkbox" id="task2">
          <label for="task2" class="task task-label">Go Shopping</label>
          <input type="text" value="Go Shopping" class="input-text task-input task">
          <button class="button edit" type="button">Save</button>
          <button class="button delete-button" type="button">
            <img src="./remove.svg" alt="Remove task">
          </button>
        </li>
      </ul>
    </section>
    
    <section class="section">
      <h2 class="section__heading">Completed</h2>
      <ul id="completed-tasks" class="list">
        <li class="list-item task-list-item">
          <input class="checkbox" type="checkbox" checked id="task3">
          <label for="task3" class="task task-label">See the Doctor</label>
          <input type="text" class="input-text task-input task">
          <button class="button edit" type="button">Edit</button>
          <button class="button delete-button" type="button">
            <img src="./remove.svg" alt="Remove task">
          </button>
        </li>
      </ul>
    </section>
  </main>
  
  <script src="app.js"></script>
</body>
</html>
